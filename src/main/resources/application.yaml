server:
  shutdown: graceful

spring:
  application:
    name: search-index-manager

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: jdbc:postgresql://localhost:5432/searchindex
    username: searchindex
    password: searchindex

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    locations: classpath:db/migration
  mvc:
    apiversion:
      use:
        path-segment: 1

  kafka:
    bootstrap-servers: ${SEARCH_INDEX_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: search-index-manager
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.value.default.type: com.izenkyt.searchindexmanager.event.IndexVersionUploadedEvent
        spring.json.trusted.packages: com.izenkyt.searchindexmanager.event

search:
  index:
    build:
      workdir: ${SEARCH_INDEX_WORKDIR:./build-work}
      executor:
        core-pool-size: 1
        max-pool-size: 2
        queue-capacity: 50
        thread-name-prefix: build-
        await-termination: 25s
    load:
      dir: ${SEARCH_INDEX_LOAD_DIR:./load-work}
      executor:
        core-pool-size: 1
        max-pool-size: 2
        queue-capacity: 50
        thread-name-prefix: load-
        await-termination: 25s
    storage:
      endpoint: ${SEARCH_INDEX_STORAGE_ENDPOINT:http://localhost:9000}
      public-endpoint: ${SEARCH_INDEX_STORAGE_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${SEARCH_INDEX_STORAGE_ACCESS_KEY:minioadmin}
      secret-key: ${SEARCH_INDEX_STORAGE_SECRET_KEY:minioadmin}
      bucket: ${SEARCH_INDEX_STORAGE_BUCKET:search-index-artifacts}
      presign-ttl: ${SEARCH_INDEX_STORAGE_PRESIGN_TTL:15m}
    events:
      topic: ${SEARCH_INDEX_EVENTS_TOPIC:index-version-uploaded}
      send-timeout: ${SEARCH_INDEX_EVENTS_SEND_TIMEOUT:10s}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.izenkyt.searchindexmanager: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.apache.lucene: WARN
  file:
    name: logs/search-index-manager.log
  structured:
    format:
      file: ecs
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
      clean-history-on-start: true

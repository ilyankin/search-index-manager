services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_USER=searchindex'
      - 'POSTGRES_PASSWORD=searchindex'
      - 'POSTGRES_DB=searchindex'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U searchindex -d searchindex']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: 'chainguard/minio:latest'
    command: 'server --console-address ":9001" /data'
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: 'apache/kafka:4.3.1'
    environment:
      - 'KAFKA_NODE_ID=1'
      - 'KAFKA_PROCESS_ROLES=broker,controller'
      - 'KAFKA_LISTENERS=PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093'
      - 'KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      - 'KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER'
      - 'KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      - 'KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT'
      - 'KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093'
      - 'KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1'
    ports:
      - '9092:9092'
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka-ui:
    image: 'ghcr.io/kafbat/kafka-ui:latest'
    ports:
      - '8090:8080'
    environment:
      - 'KAFKA_CLUSTERS_0_NAME=local'
      - 'KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092'
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build:
      context: .
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/searchindex'
      - 'SPRING_DATASOURCE_USERNAME=searchindex'
      - 'SPRING_DATASOURCE_PASSWORD=searchindex'
      - 'SEARCH_INDEX_STORAGE_ENDPOINT=http://minio:9000'
      - 'SEARCH_INDEX_STORAGE_PUBLIC_ENDPOINT=http://localhost:9000'
      - 'SEARCH_INDEX_STORAGE_ACCESS_KEY=minioadmin'
      - 'SEARCH_INDEX_STORAGE_SECRET_KEY=minioadmin'
      - 'SEARCH_INDEX_KAFKA_BOOTSTRAP_SERVERS=kafka:29092'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health/readiness']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

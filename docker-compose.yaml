services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_USER=searchindex'
      - 'POSTGRES_PASSWORD=searchindex'
      - 'POSTGRES_DB=searchindex'
    ports:
      - '5432:5432'

  minio:
    image: 'minio/minio:RELEASE.2024-08-17T01-24-54Z'
    command: 'server --console-address ":9001" /data'
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
